services:
  mfp:
    build:
      context: .
      target: runtime
    image: mfp:local
    container_name: mfp
    environment:
      MFP_CONFIG: /app/configs/config.json
      PROVIDER_API_KEY: ${PROVIDER_API_KEY:-}
    ports:
      - "18320:18320"
      - "18321:18321"
    volumes:
      - mfp-data:/app/data
      - ./configs/config.json:/app/configs/config.json:ro
    restart: unless-stopped

volumes:
  mfp-data:
