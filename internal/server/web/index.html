<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MFP Admin</title>
  <link rel="stylesheet" href="/web/styles.css">
</head>
<body>
  <section id="loginView" class="login-view">
    <div class="login-card">
      <div class="login-head">
        <div>
          <h1 data-i18n="app.title">MFP 控制台</h1>
          <p data-i18n="app.subtitle">管理虚拟模型、真实模型、规则和平台设置。</p>
        </div>
        <select id="languageSelect" aria-label="Language">
          <option value="zh-CN">中文</option>
          <option value="en-US">English</option>
        </select>
      </div>
      <label><span data-i18n="login.username">管理员用户名</span><input id="username" autocomplete="username" placeholder="admin" value="admin" data-i18n-placeholder="login.username"></label>
      <label><span data-i18n="login.password">管理员密码</span><input id="password" type="password" autocomplete="current-password" placeholder="Password" data-i18n-placeholder="login.password"></label>
      <button onclick="login()" data-i18n="login.button">登录</button>
      <div id="loginStatus" class="notice"></div>
    </div>
  </section>

  <div id="appShell" class="app-shell hidden">
    <header class="topbar">
      <div>
        <h1 data-i18n="app.title">MFP 控制台</h1>
        <p data-i18n="app.subtitle">管理虚拟模型、真实模型、规则和平台设置。</p>
      </div>
      <div class="top-actions">
        <button class="ghost" onclick="reloadConfig()" data-i18n="actions.reloadConfig">重载配置</button>
        <button class="danger" onclick="logout()" data-i18n="actions.logout">退出登录</button>
      </div>
    </header>

    <div id="status" class="notice"></div>

    <nav class="tabs" aria-label="Admin sections">
      <button class="tab active" data-tab="dashboard" data-i18n="tabs.dashboard">看板</button>
      <button class="tab" data-tab="virtualModels" data-i18n="tabs.virtualModels">虚拟模型</button>
      <button class="tab" data-tab="providers" data-i18n="tabs.providers">真实模型</button>
      <button class="tab" data-tab="rules" data-i18n="tabs.rules">规则设置</button>
      <button class="tab" data-tab="settings" data-i18n="tabs.settings">平台设置</button>
    </nav>

    <main>
      <section id="tab-dashboard" class="tab-sheet active">
        <div class="metric-grid">
          <article class="metric-card"><span data-i18n="metrics.requests">请求总数</span><strong id="requests_total">-</strong></article>
          <article class="metric-card"><span data-i18n="metrics.success">成功请求</span><strong id="success_total">-</strong></article>
          <article class="metric-card"><span data-i18n="metrics.failover">故障转移</span><strong id="failover_total">-</strong></article>
          <article class="metric-card"><span data-i18n="metrics.unhealthy">异常模型</span><strong id="unhealthy_models">-</strong></article>
        </div>
        <div class="grid two">
          <section class="panel">
            <div class="panel-head"><h2 data-i18n="dashboard.health">模型健康</h2><button class="ghost" onclick="loadAll()" data-i18n="actions.refresh">刷新</button></div>
            <div id="statusCards" class="card-list"></div>
            <div class="table-wrap"><table id="healthTable"></table></div>
          </section>
          <section class="panel">
            <div class="panel-head"><h2 data-i18n="dashboard.requests">最近请求</h2></div>
            <div class="table-wrap"><table id="requestsTable"></table></div>
            <h3 data-i18n="dashboard.sticky">Sticky / Cooldown</h3>
            <div class="table-wrap"><table id="stickyTable"></table></div>
          </section>
        </div>
      </section>

      <section id="tab-virtualModels" class="tab-sheet">
        <section class="panel">
          <div class="panel-head">
            <h2 data-i18n="vm.title">虚拟模型</h2>
            <div class="toolbar"><select id="vmSelector" onchange="selectVirtualModel()"></select><button class="ghost" onclick="newVirtualModel()" data-i18n="vm.new">新建</button><button onclick="testVirtualModel()" data-i18n="actions.test">测试</button></div>
          </div>
          <div class="form-grid four">
            <label><span data-i18n="fields.vmId">虚拟模型 ID</span><small data-i18n="help.vmId">客户端请求中的 model 值。</small><input id="vmId" placeholder="smart"></label>
            <label><span data-i18n="fields.displayName">显示名称</span><small data-i18n="help.displayName">仅用于管理台展示。</small><input id="vmDisplayName" placeholder="Smart"></label>
            <label><span data-i18n="fields.vmApiKey">虚拟模型 API Key</span><small data-i18n="help.vmApiKey">客户端调用该虚拟模型时使用。</small><div class="input-actions"><input id="vmApiKey" type="password" autocomplete="off"><button type="button" class="ghost icon-button" onclick="toggleVMApiKey()" title="Show/Hide">👁</button><button type="button" class="icon-button" onclick="copyVMApiKey()" title="Copy">⧉</button></div></label>
            <label><span data-i18n="fields.description">描述</span><small data-i18n="help.description">简短说明用途。</small><input id="vmDescription"></label>
          </div>
          <div class="form-grid four">
            <label><span data-i18n="fields.stickyScope">粘性作用域</span><small data-i18n="help.stickyScope">相同作用域优先沿用上次成功模型。</small><select id="vmStickyScope"><option value="global">global</option><option value="agent">agent</option><option value="session">session</option><option value="off">off</option></select></label>
            <label><span data-i18n="fields.stickyTimeout">粘性超时</span><small data-i18n="help.minutes">单位：分钟。</small><input id="vmStickyTimeout" type="number" min="1"></label>
            <label><span data-i18n="fields.strategy">轮换策略</span><small data-i18n="help.strategy">候选模型的初始排序方式。</small><select id="vmStrategy"><option value="sequential">sequential</option><option value="random">random</option><option value="least_loaded">least_loaded</option></select></label>
            <label class="check"><input id="vmSticky" type="checkbox"><span data-i18n="fields.enableSticky">启用粘性</span></label>
          </div>
          <div class="form-grid four">
            <label><span data-i18n="fields.maxAttempts">最大尝试次数</span><small data-i18n="help.maxAttempts">单次请求最多尝试几个候选。</small><input id="vmMaxAttempts" type="number" min="1"></label>
            <label><span data-i18n="fields.congestionThreshold">拥塞阈值</span><small data-i18n="help.congestionThreshold">并发超过该值时触发分流。</small><input id="vmCongestionThreshold" type="number" min="1"></label>
            <label><span data-i18n="fields.congestionWindow">拥塞窗口</span><small data-i18n="help.seconds">单位：秒。</small><input id="vmCongestionWindow" type="number" min="1"></label>
            <label><span data-i18n="fields.congestionCooldown">拥塞冷却</span><small data-i18n="help.seconds">单位：秒。</small><input id="vmCongestionCooldown" type="number" min="0"></label>
          </div>
          <label><span data-i18n="fields.congestionStrategy">拥塞策略</span><select id="vmCongestionStrategy"><option value="least_loaded">least_loaded</option><option value="round_robin">round_robin</option><option value="random">random</option></select></label>
          <div class="panel-head compact"><h3 data-i18n="vm.candidates">候选模型</h3><button class="ghost" onclick="addCandidateRow()" data-i18n="actions.addCandidate">添加候选</button></div>
          <div class="table-wrap"><table id="vmCandidatesTable" class="mini-table"></table></div>
          <div class="actions"><button onclick="saveVirtualModel()" data-i18n="actions.saveVM">保存虚拟模型</button><button class="danger" onclick="deleteVirtualModel()" data-i18n="actions.deleteVM">删除</button></div>
        </section>
      </section>

      <section id="tab-providers" class="tab-sheet">
        <section class="panel">
          <div class="panel-head"><h2 data-i18n="provider.title">真实模型 / Provider</h2><div class="toolbar"><select id="providerSelector" onchange="selectProvider()"></select><button class="ghost" onclick="newProvider()" data-i18n="provider.new">新建</button><button onclick="syncCurrentProviderModels()" data-i18n="actions.syncModels">同步模型</button></div></div>
          <div class="form-grid three">
            <label><span data-i18n="fields.providerId">Provider ID</span><small data-i18n="help.providerId">上游服务的唯一标识。</small><input id="providerId" placeholder="mock-primary"></label>
            <label><span data-i18n="fields.baseUrl">上游地址</span><small data-i18n="help.baseUrl">OpenAI-compatible base URL。</small><input id="providerBaseUrl" placeholder="http://host:4000/v1"></label>
            <label><span data-i18n="fields.type">类型</span><select id="providerType"><option value="openai_compatible">openai_compatible</option></select></label>
          </div>
          <div class="form-grid four">
            <label><span data-i18n="fields.timeout">请求超时</span><small data-i18n="help.ms">单位：毫秒。</small><input id="providerTimeout" type="number" min="1000"></label>
            <label><span data-i18n="fields.apiKey">API Key</span><small data-i18n="help.apiKey">直接保存到本地配置文件。</small><input id="providerApiKey" type="password" autocomplete="off"></label>
            <label><span data-i18n="fields.credentialRef">凭据名称</span><small data-i18n="help.credentialRef">用于健康影响分组。</small><input id="providerCredentialRef"></label>
            <label class="check"><input id="providerEnabled" type="checkbox"><span data-i18n="fields.enabled">启用</span></label>
          </div>
          <label><span data-i18n="fields.credentialEnv">API Key 环境变量名（可选）</span><small data-i18n="help.credentialEnv">如果未填写 API Key，才会读取该环境变量。</small><input id="providerCredentialEnv"></label>
          <label><span data-i18n="fields.headers">默认 Headers JSON</span><small data-i18n="help.headers">发送到上游的固定请求头。</small><input id="providerHeaders" placeholder='{"X-Team":"ops"}'></label>
          <div class="panel-head compact"><h3 data-i18n="provider.discoveredModels">从 /models 获取模型</h3><button class="ghost" onclick="discoverProviderModels()" data-i18n="actions.fetchModels">获取模型列表</button></div>
          <div id="discoveredModels" class="discovery-list"></div>
          <div class="actions"><button class="ghost" onclick="addSelectedDiscoveredModels()" data-i18n="actions.addSelectedModels">添加勾选模型</button></div>
          <div class="panel-head compact"><h3 data-i18n="provider.models">真实模型清单</h3><button class="ghost" onclick="addProviderModelRow()" data-i18n="actions.addModel">手动添加模型</button></div>
          <div class="table-wrap"><table id="providerModelsTable" class="mini-table"></table></div>
          <div class="actions"><button onclick="saveProvider()" data-i18n="actions.saveProvider">保存 Provider</button><button class="danger" onclick="deleteProvider()" data-i18n="actions.deleteProvider">删除</button><button class="ghost" onclick="testProviderModel()" data-i18n="actions.testProvider">测试选中模型</button></div>
        </section>
      </section>

      <section id="tab-rules" class="tab-sheet">
        <section class="panel">
          <div class="panel-head"><h2 data-i18n="rules.title">规则设置</h2><div class="toolbar"><button class="ghost" onclick="addRuleFromWizard()" data-i18n="rules.addFromWizard">按向导新增</button><button onclick="saveRules()" data-i18n="actions.saveRules">保存规则</button></div></div>
          <div class="wizard">
            <label><span data-i18n="rules.defaultAction">兜底动作</span><small data-i18n="help.defaultAction">所有未命中的报错默认执行的操作。</small><select id="defaultRuleAction"><option value="failover" data-i18n="rule.action.failover">failover</option><option value="retry" data-i18n="rule.action.retry">retry</option><option value="reject" data-i18n="rule.action.reject">reject</option></select></label>
            <p class="muted" data-i18n="rules.actionNote">failover = 切换到下一个模型，retry = 重试当前模型，reject = 直接返回错误。</p>
          </div>
          <details open><summary data-i18n="rules.advanced">细规则表</summary><div class="table-wrap"><table id="rulesTable" class="mini-table"></table></div></details>
        </section>
      </section>

      <section id="tab-settings" class="tab-sheet">
        <section class="panel">
          <div class="panel-head"><h2 data-i18n="settings.title">平台设置</h2><button onclick="saveSettings()" data-i18n="actions.saveSettings">保存设置</button></div>
          <div class="settings-grid">
            <h3 data-i18n="settings.network">端口与代理</h3>
            <label><span data-i18n="fields.apiAddr">代理监听地址</span><input id="settingApiAddr"></label>
            <label><span data-i18n="fields.adminAddr">管理台监听地址</span><input id="settingAdminAddr"></label>
            <label><span data-i18n="fields.requestTimeout">请求超时</span><small data-i18n="help.ms">单位：毫秒。</small><input id="settingRequestTimeout" type="number" min="1000"></label>
            <label class="check"><input id="settingTrustAuth" type="checkbox"><span data-i18n="fields.trustAuth">透传 Authorization</span></label>
            <label class="check"><input id="settingDebugHeaders" type="checkbox"><span data-i18n="fields.debugHeaders">输出调试响应头</span></label>
          </div>
          <h3 data-i18n="settings.accounts">管理员账号</h3>
          <div class="table-wrap"><table id="adminAccountsTable" class="mini-table"></table></div>
          <div class="actions"><button class="ghost" onclick="addAdminAccount()" data-i18n="actions.addAdmin">新增管理员</button></div>
          <h3 data-i18n="settings.export">配置导出</h3>
          <pre id="configDump">{}</pre>
        </section>
      </section>
    </main>
  </div>
  <script src="/web/i18n.js"></script>
  <script src="/web/app.js"></script>
</body>
</html>
